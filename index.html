<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanSwipe - Photo Cleaner for Android</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            background-color: #f8f9fa;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2d3436;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            color: #636e72;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            background: #0984e3;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover {
            background: #074b83;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CleanSwipe</h1>
        <p>The fastest and most efficient way to clean up your Android photo gallery. Swipe, review, and reclaim your storage space.</p>
        <a href="https://play.google.com/store/apps/details?id=com.cleanswipe.app" class="btn">View on Google Play</a>
    </div>
    <div class="footer">
        &copy; 2026 CleanSwipe App. All rights reserved.
    </div>
</body>
</html>
